<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Force Championship</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1d2a;
    color: white;
}

/* HEADER */
.header {
    background: linear-gradient(to right, #ff3c2f, #ff7a3c);
    text-align: center;
    padding: 10px;
}

.header img.logo {
    width: 80px;
}

.tagline {
    font-weight: bold;
    margin-top: 5px;
}

/* BANNER */
.banner img {
    width: 100%;
}

/* TITLE */
.section-title {
    text-align: center;
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}

/* MAIN */
.main {
    display: flex;
    padding: 20px;
}

/* LEFT */
.left {
    width: 25%;
}

.left img {
    width: 100%;
}

/* RIGHT (TENGAH CONTENT) */
.right {
    width: 75%;
    margin-left: 20px;
    text-align: center;
}

/* WELCOME TEXT */
.welcome {
    font-size: 30px;
    font-weight: bold;
    margin-top: 20px;
}

.subtext {
    font-size: 18px;
    margin-bottom: 20px;
}

/* VIDEO */
.video {
    margin: 20px 0;
}

.video video {
    width: 80%;
    border-radius: 10px;
}

/* LINK */
.link {
    margin-top: 20px;
}

.link a {
    color: yellow;
    text-decoration: none;
    font-weight: bold;
}

.link a:hover {
    text-decoration: underline;
}

/* KNOCKOUT */
.knockout {
    text-align: center;
    padding: 20px;
}

.knockout img {
    width: 90%;
}

/* FOOTER */
.footer {
    background: linear-gradient(to right, #ff3c2f, #ff7a3c);
    text-align: center;
    padding: 15px;
    font-weight: bold;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo">
    <div class="tagline">#RISETHEGLORY #BETHECHAMPION</div>
</div>

<!-- BANNER -->
<div class="banner">
    <img src="banner.png">
</div>

<!-- TITLE -->
<div class="section-title">HOME WINNER BY SEASON FIXTURES</div>

<!-- MAIN -->
<div class="main">

    <!-- LEFT -->
    <div class="left">
        <img src="winner.png">
    </div>

    <!-- RIGHT / TENGAH -->
    <div class="right">

        <div class="welcome">WELCOME</div>
        <div class="subtext">Official eFootball League</div>

        <!-- VIDEO -->
        <div class="video">
            <video controls>
                <source src="video.mp4" type="video/mp4">
                Browser tak support video.
            </video>
        </div>

        <!-- LINK -->
        <div class="link">
            Schedule for Season 7 <br>
            Klik link dibawah 👇 <br><br>
            <a href="https://copafacil.com/-loj9e" target="_blank">
                https://copafacil.com/-loj9e
            </a>
        </div>

    </div>

</div>

<!-- KNOCKOUT -->
<div class="section-title">Knockout stage</div>

<div class="knockout">
    <img src="knockout.png">
</div>

<!-- FOOTER -->
<div class="footer">
    ORGANIZER : AZUMA7 <br>
    ADMIN : ANGAH97
</div>

</body>
</html>
